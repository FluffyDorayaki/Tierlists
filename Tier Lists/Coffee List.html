<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Tier List</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    margin: 20px;
}

h1 {
    text-align: center;
}

.tier {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
}

.tier-label {
    width: 80px;
    min-height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 24px;
}

.s { background: #ff7f7f; }
.a { background: #ffbf7f; }
.b { background: #ffff7f; }
.c { background: #7fff7f; }

.tier-content {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
    background: #2a2a2a;
}

.character {
    position: relative;
}

.character img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
}

.tooltip {
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    background: #111;
    padding: 10px;
    border-radius: 8px;
    z-index: 100;
    text-align: left;
    font-size: 14px;
}

.character:hover .tooltip {
    visibility: visible;
    opacity: 1;
}

.popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #222;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
}

.close-btn {
    margin-top: 10px;
    padding: 8px 12px;
}
</style>
</head>
<body>

<h1>My Tier List</h1>

<div class="tier">
    <div class="tier-label s">S</div>

    <div class="tier-content">

        <div class="character"
             onclick="showPopup('Dragon','Best DPS in the game. Weak against crowd control.')">

            <img src="images/dragon.png" alt="trail">

            <div class="tooltip">
                <strong>Dragon</strong><br>
                Best DPS in the game.<br>
                Weak against crowd control.
            </div>

        </div>

    </div>
</div>

<div class="tier">
    <div class="tier-label a">A</div>

    <div class="tier-content">

        <div class="character"
             onclick="showPopup('Knight','Very tanky. Great beginner choice.')">

            <img src="images/knight.png" alt="Knight">

            <div class="tooltip">
                <strong>Knight</strong><br>
                Very tanky.<br>
                Great beginner choice.
            </div>

        </div>

    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popupTitle"></h2>
        <p id="popupText"></p>
        <button class="close-btn" onclick="hidePopup()">Close</button>
    </div>
</div>

<script>
function showPopup(title, text) {
    document.getElementById("popupTitle").textContent = title;
    document.getElementById("popupText").textContent = text;
    document.getElementById("popup").style.display = "flex";
}

function hidePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
